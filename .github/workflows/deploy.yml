name: Deploy portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://example.com' }}
      PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}
      PUBLIC_SOCIAL_API_URL: ${{ vars.PUBLIC_SOCIAL_API_URL }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
      PUBLIC_TURNSTILE_WORKER_URL: ${{ vars.PUBLIC_TURNSTILE_WORKER_URL }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
      HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
      CONTACT_TO_ADDRESS: ${{ secrets.CONTACT_TO_ADDRESS }}
      CONTACT_FROM_ADDRESS: ${{ secrets.CONTACT_FROM_ADDRESS }}
      TURNSTILE_SITEVERIFY_URL: ${{ vars.TURNSTILE_SITEVERIFY_URL }}
      SOCIAL_LINKEDIN_URL: ${{ vars.SOCIAL_LINKEDIN_URL }}
      SOCIAL_X_URL: ${{ vars.SOCIAL_X_URL }}
      SOCIAL_TELEGRAM_URL: ${{ vars.SOCIAL_TELEGRAM_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.12"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build -w web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK synth
        run: npm run synth
        working-directory: infra

      - name: CDK deploy
        working-directory: infra
        shell: bash
        env:
          STACK_NAME: CyberdPortfolioStack
        run: |
          set -uo pipefail

          # If a previous run left the stack mid-operation, wait it out so this
          # deploy doesn't collide with an in-progress CloudFormation update.
          wait_for_stable() {
            for i in $(seq 1 60); do
              status=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
                --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "MISSING")
              case "$status" in
                *_IN_PROGRESS)
                  echo "Stack is $status; waiting to stabilize ($i/60)..."
                  sleep 15
                  ;;
                *)
                  echo "Stack status: $status"
                  return 0
                  ;;
              esac
            done
            echo "Timed out waiting for stack to stabilize."
            return 1
          }

          # "direct" skips change sets, which avoids the intermittent
          # ChangeSetNotFound race that CDK hits in CI (aws-cdk #13187/#14350).
          attempt=1
          max_attempts=3
          while true; do
            if ! wait_for_stable; then
              exit 1
            fi

            if npm run deploy -- --require-approval never --method direct; then
              echo "CDK deploy succeeded on attempt ${attempt}."
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "CDK deploy failed after ${attempt} attempts."
              exit 1
            fi

            echo "CDK deploy attempt ${attempt} failed; retrying in 30s..."
            attempt=$((attempt + 1))
            sleep 30
          done
