name: Deploy portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://example.com' }}
      PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}
      PUBLIC_SOCIAL_API_URL: ${{ vars.PUBLIC_SOCIAL_API_URL }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
      PUBLIC_TURNSTILE_WORKER_URL: ${{ vars.PUBLIC_TURNSTILE_WORKER_URL }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
      HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
      CONTACT_TO_ADDRESS: ${{ secrets.CONTACT_TO_ADDRESS }}
      CONTACT_FROM_ADDRESS: ${{ secrets.CONTACT_FROM_ADDRESS }}
      TURNSTILE_SITEVERIFY_URL: ${{ vars.TURNSTILE_SITEVERIFY_URL }}
      SOCIAL_LINKEDIN_URL: ${{ vars.SOCIAL_LINKEDIN_URL }}
      SOCIAL_X_URL: ${{ vars.SOCIAL_X_URL }}
      SOCIAL_TELEGRAM_URL: ${{ vars.SOCIAL_TELEGRAM_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.12"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build -w web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK synth
        run: npm run synth
        working-directory: infra

      - name: CDK deploy
        working-directory: infra
        shell: bash
        run: |
          set -uo pipefail

          # Deploy with "direct" (skip change sets) to avoid the intermittent
          # ChangeSetNotFound race CDK hits in CI (aws-cdk #13187/#14350), and
          # retry a few times to ride out transient AWS/network errors.
          attempt=1
          max_attempts=3
          while true; do
            if npm run deploy -- --require-approval never --method direct; then
              echo "CDK deploy succeeded on attempt ${attempt}."
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "CDK deploy failed after ${attempt} attempts."
              exit 1
            fi

            echo "CDK deploy attempt ${attempt} failed; retrying in 30s..."
            attempt=$((attempt + 1))
            sleep 30
          done
